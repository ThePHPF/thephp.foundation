name: Build and Deploy to Netlify
on:
  pull_request_target:
    types: [ opened, synchronize, reopened, labeled ]
jobs:
  build:
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
      pull-requests: write # Required when require-reapproval=true
    if: "github.repository_owner == 'ThePHPF'"
    steps:
      # Check the gate and reset it on every workflow run 
      - name: Ensure PR has "safe to preview" label, if PR is from a fork
        uses: nilsreichardt/verify-safe-to-test-label@a65b1d76a873fe060b8ece697f238ef8805e6e23
        with:
          label: "safe to preview"
          require-reapproval: true      
    
      - uses: actions/checkout@v4
        with:
          ref: "refs/pull/${{ github.event.number }}/merge"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update Image Version in the related HelmChart values.yaml
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: 'app/config/sculpin_site_prod.yml'
          propertyPath: 'url'
          value: https://deploy-pr-${{ github.event.number }}--thephpfoundation.netlify.app
          commitChange: false
          updateFile: true

      - name: Install asset deps
        run: npm install

      - name: Build production assets
        run: npx tailwind -i assets/css/app.css -o source/assets/css/app.css --minify

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, readline
          tools: composer:v2

      - name: Install PHP deps
        uses: ramsey/composer-install@v2

      - name: Build production site
        run: ./vendor/bin/sculpin generate --env=prod

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v1.2
        with:
          production-deploy: false
          publish-dir: './output_prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: true
          overwrites-pull-request-comment: true
          enable-commit-comment: false
          alias: deploy-pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1
