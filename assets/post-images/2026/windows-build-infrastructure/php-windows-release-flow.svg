<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" role="img" aria-labelledby="title desc">
  <title id="title">From a PHP source tag to published Windows downloads</title>
  <desc id="desc">Flowchart showing a new php/php-src tag, build in php/php-windows-builder, upload via php/web-downloads API, and release on php.net.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="rgb(104 88 245)"/>
    </marker>
  </defs>

  <rect width="880" height="280" rx="8" fill="#ffffff"/>
  <rect x="1" y="1" width="878" height="278" rx="7" fill="none" stroke="#d9dee7" stroke-width="2"/>

  <text x="440" y="56" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" text-anchor="middle">From a PHP source tag to published Windows downloads</text>

  <g fill="none" stroke="rgb(104 88 245)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
    <line x1="218" y1="160" x2="252" y2="160"/>
    <line x1="422" y1="160" x2="456" y2="160"/>
    <line x1="626" y1="160" x2="660" y2="160"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <g>
      <rect x="50" y="112" width="168" height="96" rx="8" fill="#f5f3ff" stroke="rgb(104 88 245)" stroke-width="2"/>
      <text x="134" y="149" fill="#111827" font-size="16" font-weight="700" text-anchor="middle">
        <tspan x="134" dy="0">New</tspan>
        <tspan x="134" dy="21">php/php-src tag</tspan>
      </text>
      <circle cx="134" cy="232" r="11" fill="rgb(104 88 245)"/>
      <text x="134" y="236" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">1</text>
    </g>

    <g>
      <rect x="254" y="112" width="168" height="96" rx="8" fill="#f5f3ff" stroke="rgb(104 88 245)" stroke-width="2"/>
      <text x="338" y="145" fill="#111827" font-size="14" font-weight="700" text-anchor="middle">
        <tspan x="338" dy="0">Build in</tspan>
        <tspan x="338" dy="18">php/php-</tspan>
        <tspan x="338" dy="18">windows-builder</tspan>
      </text>
      <circle cx="338" cy="232" r="11" fill="rgb(104 88 245)"/>
      <text x="338" y="236" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">2</text>
    </g>

    <g>
      <rect x="458" y="112" width="168" height="96" rx="8" fill="#f5f3ff" stroke="rgb(104 88 245)" stroke-width="2"/>
      <text x="542" y="145" fill="#111827" font-size="14" font-weight="700" text-anchor="middle">
        <tspan x="542" dy="0">Upload via</tspan>
        <tspan x="542" dy="18">php/web-downloads</tspan>
        <tspan x="542" dy="18">API</tspan>
      </text>
      <circle cx="542" cy="232" r="11" fill="rgb(104 88 245)"/>
      <text x="542" y="236" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">3</text>
    </g>

    <g>
      <rect x="662" y="112" width="168" height="96" rx="8" fill="rgb(104 88 245)" stroke="rgb(104 88 245)" stroke-width="2"/>
      <text x="746" y="153" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">
        <tspan x="746" dy="0">Release on</tspan>
        <tspan x="746" dy="22">php.net</tspan>
      </text>
      <circle cx="746" cy="232" r="11" fill="rgb(104 88 245)"/>
      <text x="746" y="236" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">4</text>
    </g>
  </g>
</svg>
